<!-- @dsCard group="Type" viewport="700x170" name="Label & Subtitle" subtitle="The smallest roles — meta labels and the title subtitle" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .meta { display: flex; justify-content: space-between; align-items: baseline; font-size: var(--type-label-size); max-width: 360px; }
  .meta b { font-weight: 700; letter-spacing: 0.02em; }
  .sub { font-size: var(--type-subtitle-size); letter-spacing: 0.02em; color: var(--color-type); }
  .tok { font-size: 0.66rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="meta"><b>Location</b><span>Atlanta, Georgia</span></div>
  <span class="sub">Software Developer</span>
  <span class="tok">--type-label-size (0.7rem) · --type-subtitle-size (0.78rem)</span>
</body>
</html>
