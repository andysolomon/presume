<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
  .rule { border: 0; height: var(--hairline-weight); width: 100%; background: var(--color-hairline); margin: 0; }
  .lbl { font-size: 0.72rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
  .lbl b { color: var(--color-type); font-weight: 700; }
</style>
</head>
<body>
  <span class="lbl"><b>Hairline</b> — the only horizontal division. No thicker borders, no filled bars, no boxes.</span>
  <hr class="rule">
  <span class="lbl">If a rule feels weak, the answer is more whitespace — never a heavier line.</span>
  <hr class="rule">
</body>
</html>
