<!-- @dsCard group="Spacing" viewport="700x210" name="Page Geometry" subtitle="Capped width, vertical air — A4 in spirit, screen-adapted" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; }
  .frame { width: 100%; max-width: 420px; border: 1px solid var(--color-hairline); padding: 18px 22px; position: relative; }
  .col { height: 74px; background: var(--color-accent-soft); border-left: 1px solid var(--color-hairline); border-right: 1px solid var(--color-hairline); }
  .tok { font-size: 0.66rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
  .cap { display: flex; justify-content: space-between; margin-top: 10px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="col"></div>
    <div class="cap"><span class="tok">--page-margin-x / -y · 2rem</span><span class="tok">--page-max-width · 52rem</span></div>
  </div>
</body>
</html>
