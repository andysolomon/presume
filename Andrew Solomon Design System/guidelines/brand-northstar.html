<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 34px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .ns { font-size: 1.5rem; font-weight: 700; color: var(--color-type); letter-spacing: 0.01em; margin: 0; line-height: 1.15; }
  .ns .amp { color: var(--color-accent); }
  .body { font-size: 0.8rem; line-height: 1.55; color: var(--color-mid-type); margin: 0; max-width: 60ch; }
  .rule { border: 0; height: 1px; background: var(--color-hairline); margin: 2px 0; width: 44px; }
</style>
</head>
<body>
  <h2 class="ns">The Engineering <span class="amp">Letter</span></h2>
  <hr class="rule">
  <p class="body">A formal, single-sheet artifact — engineered, not decorated. Reads like a well-built Stripe or Vercel document: tight hierarchy, deliberate whitespace, every glyph paying its own way. Confidence signaled by restraint, not volume.</p>
</body>
</html>
