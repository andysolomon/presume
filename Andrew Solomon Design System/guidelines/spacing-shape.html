<!-- @dsCard group="Spacing" viewport="700x180" name="Shape — Rectilinear" subtitle="--radius is 0 everywhere; the system is rectilinear by commitment" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; align-items: center; gap: 28px; }
  .box { width: 84px; height: 84px; border: 1px solid var(--color-hairline); border-radius: var(--radius); display: grid; place-items: center; }
  .box .fill { width: 44px; height: 44px; background: var(--color-accent); border-radius: var(--radius); }
  .txt { display: flex; flex-direction: column; gap: 6px; }
  .h { font-size: 0.9rem; font-weight: 700; color: var(--color-type); }
  .tok { font-size: 0.7rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="box"><span class="fill"></span></div>
  <div class="txt"><span class="h">Corners are square.</span><span class="tok">--radius: 0 · no rounded corners, anywhere</span></div>
</body>
</html>
