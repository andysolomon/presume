<!-- @dsCard group="Type" viewport="700x180" name="The Two-Weight Rule" subtitle="400 and 700 only — the contrast ratio is binary by design" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; align-items: center; gap: 40px; }
  .spec { display: flex; flex-direction: column; gap: 4px; }
  .big { font-size: 2rem; line-height: 1; color: var(--color-type); }
  .r { font-weight: 400; }
  .b { font-weight: 700; }
  .tok { font-size: 0.66rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="spec"><span class="big r">Raleway</span><span class="tok">--weight-regular · 400</span></div>
  <div class="spec"><span class="big b">Raleway</span><span class="tok">--weight-bold · 700</span></div>
</body>
</html>
