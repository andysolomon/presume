<!-- @dsCard group="Type" viewport="700x220" name="Display — Title Block" subtitle="Raleway 400 small-caps, 0.08em tracking; reserved for the title" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .display {
    display: inline-flex; align-items: center; gap: 0.75rem;
    font-size: 2.4rem; font-weight: 400; line-height: 1; letter-spacing: 0.08em;
    font-variant: small-caps; text-transform: lowercase; color: var(--color-type);
  }
  .bar { width: 3px; height: 0.9em; background: var(--color-accent); }
  .tok { font-size: 0.66rem; color: var(--color-mid-type); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="display"><span>Andrew Solomon</span><span class="bar"></span><span>Resume</span></div>
  <span class="tok">--type-display-size · font-variant: small-caps · --type-display-tracking (0.08em)</span>
</body>
</html>
