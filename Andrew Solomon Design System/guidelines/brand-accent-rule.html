<!-- @dsCard group="Brand" viewport="700x220" name="The One Accent Rule" subtitle="One accent carries every emphasis — ≤8% of the surface" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 32px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .line { font-size: 0.95rem; color: var(--color-type); line-height: 1.5; margin: 0; }
  .line .a { color: var(--color-accent); font-weight: 700; }
  .rules { display: flex; flex-direction: column; gap: 8px; }
  .r { font-size: 0.74rem; color: var(--color-mid-type); }
  .r b { color: var(--color-type); font-weight: 700; }
  .swatch { display: inline-block; width: 10px; height: 10px; background: var(--color-accent); margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>
  <p class="line">Section headers, the title <span class="a">bar</span>, dates, and active links — all one <span class="a">amber</span>. Everything else is ink and whisper-grey.</p>
  <div class="rules">
    <span class="r"><span class="swatch"></span><b>Never two accents.</b> Never a gradient.</span>
    <span class="r"><span class="swatch"></span><b>Always semantic.</b> Color marks a role — never decoration.</span>
  </div>
</body>
</html>
