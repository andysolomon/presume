<!-- @dsCard group="Brand" viewport="700x190" name="Flat by Commitment" subtitle="No shadows, no glass, no tonal layering — depth is hairline + whitespace" -->
<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; align-items: center; gap: 26px; }
  .stack { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--color-hairline); }
  .stack > div { padding: 10px 16px; font-size: 0.78rem; color: var(--color-type); }
  .stack > div + div { border-top: 1px solid var(--color-hairline); }
  .txt { display: flex; flex-direction: column; gap: 6px; }
  .h { font-size: 0.9rem; font-weight: 700; color: var(--color-type); }
  .tok { font-size: 0.72rem; color: var(--color-mid-type); line-height: 1.5; max-width: 34ch; }
</style>
</head>
<body>
  <div class="stack"><div>Layer</div><div>Layer</div><div>Layer</div></div>
  <div class="txt"><span class="h">Depth is division, not light.</span><span class="tok">Zero shadow vocabulary. Zero backdrop-filter. Hairlines and vertical space do the work a shadow would.</span></div>
</body>
</html>
