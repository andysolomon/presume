<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andrew Solomon — Résumé</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; }
  .resume-sheet {
    max-width: var(--page-max-width);
    margin: 0 auto;
    padding: var(--page-margin-y) var(--page-margin-x);
    display: flex;
    flex-direction: column;
    gap: var(--space-2xl);
    font-family: var(--font-sans);
  }
  .alt-row { display: flex; flex-wrap: wrap; justify-content: center; gap: var(--space-lg); margin-top: calc(-1 * var(--space-md)); }
  .meta-block { display: flex; flex-direction: column; gap: 0; }
  .prose { max-width: 70ch; margin: 0 auto; font-size: var(--type-body-size); line-height: var(--leading-prose); }
  .skills { list-style: none; padding: 0; margin: 0; font-size: var(--type-body-size); line-height: var(--leading-prose); display: flex; flex-direction: column; gap: var(--space-md); }
  .skills li { padding-left: 1.1em; text-indent: -1.1em; }
  .skills li::before { content: '\00b7'; padding-right: 0.7em; color: var(--color-type); }
  .skill-label { font-weight: var(--weight-bold); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ResumeScreen.jsx"></script>
<script type="text/babel">
  const NS = window.AndrewSolomonDesignSystem_12f855;
  const { IconButton, Button } = NS;

  const Sun = () => (
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
  );
  const Moon = () => (<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>);
  const Download = () => (
    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M7 1.5v7.4M3.6 5.5 7 8.9l3.4-3.4M2.5 11.5h9" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="square"/></svg>
  );

  function App() {
    const [theme, setTheme] = React.useState(
      () => (document.documentElement.getAttribute('data-theme') || 'dark')
    );
    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
      try { localStorage.setItem('resume-theme', theme); } catch (e) {}
    }, [theme]);

    return (
      <>
        <div style={{ position: 'fixed', top: 'var(--space-xl)', left: 'var(--space-xl)', zIndex: 10 }}>
          <Button href="#" icon={<Download/>} onClick={(e) => e.preventDefault()}>Export PDF</Button>
        </div>
        <div style={{ position: 'fixed', top: 'var(--space-xl)', right: 'var(--space-xl)', zIndex: 10 }}>
          <IconButton
            ariaLabel={theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'}
            icon={theme === 'dark' ? <Sun/> : <Moon/>}
            onClick={() => setTheme((t) => (t === 'dark' ? 'light' : 'dark'))}
          />
        </div>
        <window.ResumeScreen ns={NS} />
      </>
    );
  }

  // ResumeScreen.jsx loads async via Babel; wait for it before mounting.
  (function mount() {
    if (!window.ResumeScreen) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  })();
</script>
</body>
</html>
