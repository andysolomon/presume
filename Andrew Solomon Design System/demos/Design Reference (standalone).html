  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\" data-theme=\"dark\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Andrew Solomon — Design Reference<\u002Ftitle>\n<style>/*\n * Andrew Solomon Résumé — Design System\n * Global entry point. Consumers link this one file.\n * Keep this a list of @imports only — never inline rules here.\n */\n/* ---------------------------------------------------------------------------\n * Fonts — Raleway (self-hosted woff2, latin + latin-ext).\n * The Single-Family Rule: Raleway is the only typeface in this system.\n * The Two-Weight Rule: only 400 (regular) and 700 (bold) are used.\n * These are Google Fonts' variable woff2 subsets (one file per subset covers\n * the full weight axis); self-hosted so consumers carry no CDN dependency.\n * Source: fonts.google.com/specimen/Raleway\n * ------------------------------------------------------------------------- */\n\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"31ab59e7-baeb-4bbc-a58a-843544cfc46c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"31ab59e7-baeb-4bbc-a58a-843544cfc46c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"c11c4dea-a4a3-47fb-889d-ac377857fc9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c11c4dea-a4a3-47fb-889d-ac377857fc9b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n\n/*\n * Colors — near-monochrome, one accent.\n * Dark is CANONICAL: base :root carries the dark palette so any surface\n * renders correctly with no [data-theme] attribute. [data-theme='light']\n * is the parity override. Values lifted 1:1 from web/src/styles/tokens.css.\n *\n * The One Accent Rule: a single amber accent carries every emphasis\n * (section headers, the title bar, dates, links). Never two accents,\n * never a gradient. The legacy #0096FF \"process blue\" is RETIRED.\n */\n\n:root {\n  /* ---- Dark (canonical) ---- */\n  --color-surface: oklch(16% 0.008 80);      /* near-black, warm-tinted */\n  --color-type: oklch(94% 0.005 80);         /* primary ink */\n  --color-mid-type: oklch(70% 0.008 80);     /* secondary layer (companies) */\n  --color-hairline: oklch(28% 0.008 80);     /* the only divider color */\n  --color-accent: oklch(72% 0.13 75);        /* amber — the one accent */\n  --color-accent-soft: oklch(72% 0.13 75 / 0.18);\n  color-scheme: dark;\n}\n\n/* explicit dark, in case a consumer sets it */\n:root[data-theme='dark'] {\n  --color-surface: oklch(16% 0.008 80);\n  --color-type: oklch(94% 0.005 80);\n  --color-mid-type: oklch(70% 0.008 80);\n  --color-hairline: oklch(28% 0.008 80);\n  --color-accent: oklch(72% 0.13 75);\n  --color-accent-soft: oklch(72% 0.13 75 / 0.18);\n  color-scheme: dark;\n}\n\n/* ---- Light (parity) ---- */\n:root[data-theme='light'] {\n  --color-surface: #ffffff;\n  --color-type: oklch(18% 0.005 80);\n  --color-mid-type: oklch(50% 0.005 80);\n  --color-hairline: oklch(89% 0.003 80);\n  --color-accent: oklch(50% 0.16 55);        /* deeper burnt-amber for AA on white */\n  --color-accent-soft: oklch(50% 0.16 55 / 0.12);\n  color-scheme: light;\n}\n\n/*\n * Typography — single family (Raleway), two weights (400 / 700).\n * Hierarchy is carried by weight and scale only, never by a second family.\n * Sizes mirror the LaTeX 10pt baseline as adapted for screen in\n * web/src/styles/tokens.css.\n */\n\n:root {\n  /* Single-Family Rule: Raleway and only Raleway */\n  --font-sans: 'Raleway', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n\n  /* Two-Weight Rule: 400 and 700, nothing between */\n  --weight-regular: 400;\n  --weight-bold: 700;\n\n  /* Type scale */\n  --type-display-size: clamp(2rem, 4.5vw, 2.75rem); /* title block, small-caps */\n  --type-display-tracking: 0.08em;\n  --type-headline-size: 0.95rem;   /* section headers (accent) */\n  --type-title-size: 0.875rem;     /* event/role titles */\n  --type-body-size: 0.875rem;      /* body, bullets */\n  --type-subtitle-size: 0.78rem;   /* subhead under title */\n  --type-label-size: 0.7rem;       /* meta labels, uppercase micro-labels */\n\n  /* Semantic line-heights */\n  --leading-tight: 1.2;\n  --leading-snug: 1.3;\n  --leading-body: 1.55;\n  --leading-prose: 1.6;\n}\n\n/*\n * Spacing — mirrors the LaTeX pt-based rhythm, plus page geometry.\n * Layout breathes vertically via these steps; the system prefers more\n * whitespace over louder rules (the Hairline-Is-The-Layer Rule).\n */\n\n:root {\n  --space-xs: 0.125rem;   /* 2pt  */\n  --space-sm: 0.25rem;    /* 3pt  */\n  --space-md: 0.5rem;     /* 6pt  */\n  --space-lg: 0.75rem;    /* 8pt  */\n  --space-xl: 1rem;       /* 12pt */\n  --space-2xl: 1.5rem;\n  --space-3xl: 2rem;\n\n  /* Page geometry — A4 feel, web-adapted (reads on a screen, not a sheet) */\n  --page-margin-y: 2rem;\n  --page-margin-x: 2rem;\n  --page-max-width: 52rem;\n\n  /* Hairline weight — DESIGN.md mandates 0.4pt; on screen that's 1px subpixel */\n  --hairline-weight: 1px;\n\n  /* The system is rectilinear by commitment — no rounded corners.\n     --radius is the canonical corner token components read; it is 0 by rule. */\n  --radius: 0px;\n  --radius-none: 0px;\n}\n\n/*\n * Motion — restrained. Exponential ease-out only; no bounce, no elastic.\n * Transitions are limited to color/border shifts (hover, theme flip).\n */\n\n:root {\n  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --duration-fast: 160ms; /* @kind other */\n  --duration-base: 240ms; /* @kind other */\n}\n\n/* =============================================================================\n   BASE — Andrew Solomon Design System\n   -----------------------------------------------------------------------------\n   Page-level resets + brand defaults. Sets the dark canon ground, single-family\n   type, and the accent-aware selection + link idioms. Kept deliberately small —\n   components carry their own styling; this is the canvas they sit on.\n   ========================================================================== */\n\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\nhtml,\nbody {\n  margin: 0;\n  padding: 0;\n}\n\nhtml {\n  background: var(--color-surface);\n  color: var(--color-type);\n  font-family: var(--font-sans);\n  font-size: 16px;\n  font-weight: var(--weight-regular);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  /* Surface and ink cross-fade together when the theme flips */\n  transition:\n    background-color var(--duration-base) var(--ease-out-expo),\n    color var(--duration-base) var(--ease-out-expo);\n}\n\nbody {\n  min-height: 100vh;\n  background: var(--color-surface);\n  color: var(--color-type);\n  line-height: 1.4;\n  font-size: var(--type-body-size);\n}\n\n/* Default link idiom: accent at rest, lifts to ink on hover (the footer idiom).\n   Components override with their own variants where a different idiom applies. */\na {\n  color: var(--color-accent);\n  text-decoration: none;\n  transition: color var(--duration-fast) var(--ease-out-expo);\n}\n\na:hover,\na:focus-visible {\n  color: var(--color-type);\n  outline: none;\n}\n\na:focus-visible {\n  outline: var(--hairline-weight) solid var(--color-accent);\n  outline-offset: 2px;\n}\n\n/* Selection picks up the accent, softly */\n::selection {\n  background: var(--color-accent-soft);\n  color: var(--color-type);\n}\n\n/* Respect reduced motion — kill the theme cross-fade */\n@media (prefers-reduced-motion: reduce) {\n  html {\n    transition: none;\n  }\n}\n\n<\u002Fstyle>\n\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  body {\n    background: var(--color-surface);\n    color: var(--color-type);\n    font-family: var(--font-sans);\n    font-weight: var(--weight-regular);\n    -webkit-font-smoothing: antialiased;\n    transition: background-color var(--duration-base) var(--ease-out-expo),\n                color var(--duration-base) var(--ease-out-expo);\n  }\n  a { color: var(--color-accent); text-decoration: none; }\n  a:hover { color: var(--color-type); }\n\n  .page {\n    max-width: var(--page-max-width);\n    margin: 0 auto;\n    padding: calc(var(--space-3xl) * 1.5) var(--page-margin-x) var(--space-3xl);\n  }\n\n  /* ---- masthead ---- */\n  .masthead { text-align: center; }\n  .wordmark {\n    display: inline-flex; align-items: center; gap: var(--space-lg);\n    margin: 0; font-size: var(--type-display-size); font-weight: var(--weight-regular);\n    line-height: 1; letter-spacing: var(--type-display-tracking);\n    font-variant: small-caps; text-transform: lowercase; color: var(--color-type);\n  }\n  .wordmark .bar { display: inline-block; width: 3px; height: 0.9em; background: var(--color-accent); }\n  .masthead .eyebrow {\n    margin: var(--space-xl) 0 0; font-size: var(--type-label-size);\n    font-weight: var(--weight-bold); letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--color-mid-type);\n  }\n\n  /* ---- section scaffolding ---- */\n  .rule { border: 0; height: var(--hairline-weight); width: 100%; background: var(--color-hairline); margin: 0; }\n  .block { margin-top: var(--space-3xl); }\n  .block > .head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    gap: var(--space-xl); margin-bottom: var(--space-xl);\n  }\n  .block > .head h2 {\n    margin: 0; font-size: var(--type-label-size); font-weight: var(--weight-bold);\n    letter-spacing: 0.18em; text-transform: uppercase; color: var(--color-accent);\n  }\n  .block > .head .n { font-size: var(--type-label-size); color: var(--color-mid-type); letter-spacing: 0.1em; }\n  .block > .head + .rule { margin-bottom: var(--space-2xl); }\n\n  /* ---- color ---- */\n  .swatches { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--space-xl); }\n  .swatch .chip { height: 68px; border: var(--hairline-weight) solid var(--color-hairline); }\n  .swatch .name { margin-top: var(--space-md); font-size: var(--type-label-size); font-weight: var(--weight-bold); }\n  .swatch .val { font-size: var(--type-label-size); color: var(--color-mid-type); }\n\n  /* ---- type scale ---- */\n  .type-row { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-xl); padding: var(--space-lg) 0; }\n  .type-row + .type-row { border-top: var(--hairline-weight) solid var(--color-hairline); }\n  .type-row .label { font-size: var(--type-label-size); color: var(--color-mid-type); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }\n  .d { font-size: var(--type-display-size); letter-spacing: var(--type-display-tracking); }\n  .h { font-size: var(--type-headline-size); font-weight: var(--weight-bold); color: var(--color-accent); }\n  .t { font-size: var(--type-title-size); font-weight: var(--weight-bold); }\n  .b { font-size: var(--type-body-size); }\n  .s { font-size: var(--type-subtitle-size); }\n\n  /* ---- components ---- */\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3xl); }\n  @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }\n  .spec-label { font-size: var(--type-label-size); color: var(--color-mid-type); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 var(--space-lg); }\n  .row { display: flex; align-items: center; gap: var(--space-lg); flex-wrap: wrap; }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: var(--space-md);\n    padding: 0.5rem 0.85rem; background: transparent;\n    border: var(--hairline-weight) solid var(--color-hairline);\n    color: var(--color-type); font-family: var(--font-sans);\n    font-size: var(--type-label-size); font-weight: var(--weight-bold);\n    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 0;\n    transition: border-color var(--duration-fast) var(--ease-out-expo), color var(--duration-fast) var(--ease-out-expo);\n  }\n  .btn:hover { border-color: var(--color-accent); color: var(--color-accent); }\n  .btn:disabled { opacity: 0.45; cursor: default; }\n  .btn:disabled:hover { border-color: var(--color-hairline); color: var(--color-type); }\n  .btn svg { width: 14px; height: 14px; display: block; }\n  .icon-btn {\n    width: 2.25rem; height: 2.25rem; display: grid; place-items: center; padding: 0;\n    background: transparent; border: var(--hairline-weight) solid var(--color-hairline);\n    color: var(--color-type); cursor: pointer; border-radius: 0;\n    transition: border-color var(--duration-fast) var(--ease-out-expo), color var(--duration-fast) var(--ease-out-expo);\n  }\n  .icon-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }\n  .icon-btn svg { width: 0.95rem; height: 0.95rem; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }\n\n  .lnk-inline { color: var(--color-type); border-bottom: var(--hairline-weight) solid var(--color-hairline); }\n  .lnk-inline:hover { color: var(--color-accent); border-color: var(--color-accent); }\n  .lnk-eyebrow { font-size: var(--type-label-size); font-weight: var(--weight-bold); letter-spacing: 0.08em; text-transform: uppercase; }\n\n  /* CV event specimen */\n  .cv { }\n  .cv .cv-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-xl); }\n  .cv .cv-title { margin: 0; font-size: var(--type-title-size); font-weight: var(--weight-regular); line-height: var(--leading-snug); }\n  .cv .cv-title strong { font-weight: var(--weight-bold); color: var(--color-type); }\n  .cv .cv-title .co { color: var(--color-mid-type); }\n  .cv .cv-date { font-size: var(--type-body-size); color: var(--color-accent); white-space: nowrap; }\n  .cv .cv-rule { border: 0; height: var(--hairline-weight); background: var(--color-hairline); margin: var(--space-md) 0 var(--space-lg); }\n  .cv ul { list-style: none; padding: 0; margin: 0; font-size: var(--type-body-size); line-height: var(--leading-body); display: flex; flex-direction: column; gap: var(--space-sm); }\n  .cv li { padding-left: 1.1em; text-indent: -1.1em; }\n  .cv li::before { content: '\\00b7'; padding-right: 0.7em; }\n\n  .meta-row { display: flex; justify-content: space-between; align-items: baseline; font-size: var(--type-label-size); line-height: 1.9; }\n  .meta-row .k { font-weight: var(--weight-bold); letter-spacing: 0.02em; }\n\n  /* rules list */\n  .rules { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--space-lg); }\n  .rules li { padding-left: 1.4em; text-indent: -1.4em; font-size: var(--type-body-size); line-height: var(--leading-body); }\n  .rules li::before { content: '\\00b7'; padding-right: 0.9em; color: var(--color-accent); font-weight: var(--weight-bold); }\n  .rules b { font-weight: var(--weight-bold); }\n\n  .foot { margin-top: var(--space-3xl); padding-top: var(--space-2xl); border-top: var(--hairline-weight) solid var(--color-hairline); text-align: center; font-size: var(--type-label-size); color: var(--color-mid-type); letter-spacing: 0.04em; }\n\n  .toggle-fixed { position: fixed; top: var(--space-xl); right: var(--space-xl); z-index: 10; }\n\n  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <button class=\"icon-btn toggle-fixed\" id=\"themeToggle\" aria-label=\"Toggle theme\"><\u002Fbutton>\n\n  <div class=\"page\">\n    <header class=\"masthead\">\n      <h1 class=\"wordmark\"><span>Andrew Solomon<\u002Fspan><span class=\"bar\" aria-hidden=\"true\"><\u002Fspan><span>Design<\u002Fspan><\u002Fh1>\n      <p class=\"eyebrow\">The Engineering Letter · Design Reference<\u002Fp>\n    <\u002Fheader>\n\n    <!-- COLOR -->\n    <section class=\"block\">\n      <div class=\"head\"><h2>Color<\u002Fh2><span class=\"n\">01<\u002Fspan><\u002Fdiv>\n      <hr class=\"rule\">\n      <div class=\"swatches\">\n        <div class=\"swatch\"><div class=\"chip\" style=\"background: var(--color-surface);\"><\u002Fdiv><div class=\"name\">Surface<\u002Fdiv><div class=\"val\">ground<\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background: var(--color-type);\"><\u002Fdiv><div class=\"name\">Ink<\u002Fdiv><div class=\"val\">primary type<\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background: var(--color-mid-type);\"><\u002Fdiv><div class=\"name\">Mid-type<\u002Fdiv><div class=\"val\">secondary<\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background: var(--color-hairline);\"><\u002Fdiv><div class=\"name\">Hairline<\u002Fdiv><div class=\"val\">the only divider<\u002Fdiv><\u002Fdiv>\n        <div class=\"swatch\"><div class=\"chip\" style=\"background: var(--color-accent);\"><\u002Fdiv><div class=\"name\">Accent<\u002Fdiv><div class=\"val\">amber · ≤ 8%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TYPE -->\n    <section class=\"block\">\n      <div class=\"head\"><h2>Type — Raleway 400 / 700<\u002Fh2><span class=\"n\">02<\u002Fspan><\u002Fdiv>\n      <hr class=\"rule\">\n      <div class=\"type-row\"><span class=\"d\">Andrew Solomon<\u002Fspan><span class=\"label\">Display · small-caps<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"h\">Experience<\u002Fspan><span class=\"label\">Headline · accent<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"t\">Senior Salesforce Engineer<\u002Fspan><span class=\"label\">Title · 700<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"b\">Built and scaled 2GP package pipelines across 33+ repositories.<\u002Fspan><span class=\"label\">Body · 400<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"s\">Software Developer<\u002Fspan><span class=\"label\">Subtitle<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- COMPONENTS -->\n    <section class=\"block\">\n      <div class=\"head\"><h2>Components<\u002Fh2><span class=\"n\">03<\u002Fspan><\u002Fdiv>\n      <hr class=\"rule\">\n      <div class=\"grid-2\">\n        <div>\n          <p class=\"spec-label\">Buttons<\u002Fp>\n          <div class=\"row\" style=\"margin-bottom: var(--space-2xl);\">\n            <button class=\"btn\"><svg viewBox=\"0 0 14 14\" aria-hidden=\"true\"><path d=\"M7 1.5v7.4M3.6 5.5 7 8.9l3.4-3.4M2.5 11.5h9\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"square\"><\u002Fpath><\u002Fsvg>Export PDF<\u002Fbutton>\n            <button class=\"btn\">View source<\u002Fbutton>\n            <button class=\"btn\" disabled=\"\">Disabled<\u002Fbutton>\n          <\u002Fdiv>\n          <p class=\"spec-label\">Links<\u002Fp>\n          <div class=\"row\">\n            <a class=\"lnk-inline\" href=\"#\">inline link<\u002Fa>\n            <a class=\"lnk-eyebrow\" href=\"#\">Eyebrow link<\u002Fa>\n            <a href=\"#\">accent link<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p class=\"spec-label\">Meta rows<\u002Fp>\n          <div class=\"meta-row\"><span class=\"k\">Location<\u002Fspan><span>Atlanta, Georgia<\u002Fspan><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Portfolio<\u002Fspan><a href=\"#\">andrewsolomon.dev<\u002Fa><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Email<\u002Fspan><a href=\"#\">andrewsolomon.edu@gmail.com<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: var(--space-3xl);\">\n        <p class=\"spec-label\">CV event<\u002Fp>\n        <article class=\"cv\">\n          <div class=\"cv-head\">\n            <h3 class=\"cv-title\"><strong>Senior Salesforce Engineer / Technical Lead<\u002Fstrong><span class=\"co\">  —  Thrivent Financial<\u002Fspan><\u002Fh3>\n            <time class=\"cv-date\">2024 — Present<\u002Ftime>\n          <\u002Fdiv>\n          <hr class=\"cv-rule\">\n          <ul>\n            <li>Built and scaled 2GP package pipelines across 33+ repositories.<\u002Fli>\n            <li>Developed Lightning Web Components with GraphQL and Apex service layers for external clients.<\u002Fli>\n          <\u002Ful>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RULES -->\n    <section class=\"block\">\n      <div class=\"head\"><h2>The Five Rules<\u002Fh2><span class=\"n\">04<\u002Fspan><\u002Fdiv>\n      <hr class=\"rule\">\n      <ul class=\"rules\">\n        <li><b>Single-Family<\u002Fb> — Raleway only; hierarchy from weight and scale.<\u002Fli>\n        <li><b>Two-Weight<\u002Fb> — 400 and 700, nothing between.<\u002Fli>\n        <li><b>One-Accent<\u002Fb> — a single amber, ≤ 8% of any surface. No gradients.<\u002Fli>\n        <li><b>Hairline-Is-The-Layer<\u002Fb> — 1px rules only; add whitespace, never weight.<\u002Fli>\n        <li><b>Flat &amp; Rectilinear<\u002Fb> — no shadows, no rounded corners, ever.<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <footer class=\"foot\">Dark is canonical · toggle theme, top-right · plain HTML + CSS + JS on the Presume tokens<\u002Ffooter>\n  <\u002Fdiv>\n\n  <script>\n    (function () {\n      var root = document.documentElement;\n      var btn = document.getElementById('themeToggle');\n      var SUN = '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"4\"/><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"22\"/><line x1=\"2\" y1=\"12\" x2=\"4\" y2=\"12\"/><line x1=\"20\" y1=\"12\" x2=\"22\" y2=\"12\"/><line x1=\"4.93\" y1=\"4.93\" x2=\"6.34\" y2=\"6.34\"/><line x1=\"17.66\" y1=\"17.66\" x2=\"19.07\" y2=\"19.07\"/><line x1=\"4.93\" y1=\"19.07\" x2=\"6.34\" y2=\"17.66\"/><line x1=\"17.66\" y1=\"6.34\" x2=\"19.07\" y2=\"4.93\"/><\u002Fsvg>';\n      var MOON = '<svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z\"/><\u002Fsvg>';\n      function apply(t) {\n        root.setAttribute('data-theme', t);\n        btn.innerHTML = t === 'dark' ? SUN : MOON;\n        try { localStorage.setItem('resume-theme', t); } catch (e) {}\n      }\n      var saved = 'dark';\n      try { saved = localStorage.getItem('resume-theme') || 'dark'; } catch (e) {}\n      apply(saved);\n      btn.addEventListener('click', function () {\n        apply(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');\n      });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
