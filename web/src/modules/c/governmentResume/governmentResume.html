<template>
  <a
    class="pdf-export"
    href="/assets/andrewsolomon.pdf"
    download="andrewsolomon-government-resume.pdf"
    aria-label="Download Andrew Solomon's government resume as a PDF"
  >
    <svg class="pdf-export-icon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
      <path d="M7 1.5v7.4M3.6 5.5 7 8.9l3.4-3.4M2.5 11.5h9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/>
    </svg>
    <span class="pdf-export-label">Export PDF</span>
  </a>
  <c-theme-toggle theme={theme} ontoggle={handleThemeToggle}></c-theme-toggle>

  <main class="resume" aria-label="Andrew Solomon — Government Experience">
    <header class="title-block">
      <h1 class="title-line">
        <template lwc:if={hasNameLink}>
          <a
            class="name name-link"
            href={nameHref}
            target="_blank"
            rel="noopener noreferrer"
            title="Andrew Solomon on LinkedIn"
          >{header.name}</a>
        </template>
        <template lwc:else>
          <span class="name">{header.name}</span>
        </template>
        <span class="bar" aria-hidden="true"></span>
        <span class="name">{header.title}</span>
      </h1>
      <p class="subtitle">{header.subtitle}</p>
      <p class="alternate-link-row">
        <a class="alternate-link" href={mainResumeHref}>Back to main resume</a>
      </p>
    </header>

    <section class="meta" aria-label="Contact">
      <template for:each={metaItems} for:item="m">
        <div key={m.key} class="meta-row">
          <span class="meta-label">{m.label}</span>
          <template lwc:if={m.isLink}>
            <a class="meta-value meta-link" href={m.href}>{m.value}</a>
          </template>
          <template lwc:else>
            <span class="meta-value">{m.value}</span>
          </template>
        </div>
      </template>
      <hr class="hairline" />
    </section>

    <section class="block">
      <h2 class="section-header">Government Profile</h2>
      <p class="prose">{summary}</p>
    </section>

    <section class="block">
      <h2 class="section-header">Highlights</h2>
      <ul class="bullets bullets-compact">
        <template for:each={highlights} for:item="item">
          <li key={item.key}>{item.text}</li>
        </template>
      </ul>
    </section>

    <section class="block">
      <h2 class="section-header">Government Experience</h2>
      <template for:each={governmentExperience} for:item="e">
        <article key={e.key} class="event">
          <header class="event-header">
            <h3 class="event-title-line">
              <strong class="event-title">{e.title}</strong><span class="event-company-sep">{e.companySeparator}</span><template lwc:if={e.hasCompanyLink}><a
                  class="event-company event-company-link"
                  href={e.companyHref}
                  target="_blank"
                  rel="noopener noreferrer"
                >{e.company}</a></template><template lwc:else><span class="event-company">{e.company}</span></template>
            </h3>
            <time class="event-date">{e.date}</time>
          </header>
          <hr class="hairline" />
          <ul class="bullets">
            <template for:each={e.bullets} for:item="b">
              <li key={b.key}>{b.text}</li>
            </template>
          </ul>
        </article>
      </template>
    </section>

    <section class="block">
      <h2 class="section-header">Recent Salesforce Experience</h2>
      <p class="prose section-intro">
        Recent commercial Salesforce delivery that complements the VA work with platform leadership, package engineering, LWC architecture, testing, and enterprise-scale implementation experience.
      </p>
      <template for:each={additionalExperience} for:item="e">
        <article key={e.key} class="event">
          <header class="event-header">
            <h3 class="event-title-line">
              <strong class="event-title">{e.title}</strong><span class="event-company-sep">{e.companySeparator}</span><template lwc:if={e.hasCompanyLink}><a
                  class="event-company event-company-link"
                  href={e.companyHref}
                  target="_blank"
                  rel="noopener noreferrer"
                >{e.company}</a></template><template lwc:else><span class="event-company">{e.company}</span></template>
            </h3>
            <time class="event-date">{e.date}</time>
          </header>
          <hr class="hairline" />
          <ul class="bullets">
            <template for:each={e.bullets} for:item="b">
              <li key={b.key}>{b.text}</li>
            </template>
          </ul>
        </article>
      </template>
    </section>

    <section class="block">
      <h2 class="section-header">Technical Skills</h2>
      <ul class="skills">
        <template for:each={skills} for:item="s">
          <li key={s.key}><span class="skill-label">{s.label}</span> {s.value}</li>
        </template>
      </ul>
    </section>

    <section class="block">
      <h2 class="section-header">Education</h2>
      <template for:each={education} for:item="e">
        <article key={e.key} class="event">
          <header class="event-header">
            <h3 class="event-title-line">
              <strong class="event-title">{e.title}</strong><span class="event-company-sep">{e.companySeparator}</span><template lwc:if={e.hasCompanyLink}><a
                  class="event-company event-company-link"
                  href={e.companyHref}
                  target="_blank"
                  rel="noopener noreferrer"
                >{e.company}</a></template><template lwc:else><span class="event-company">{e.company}</span></template>
            </h3>
            <time class="event-date">{e.date}</time>
          </header>
          <hr class="hairline" />
          <ul class="bullets">
            <template for:each={e.bullets} for:item="b">
              <li key={b.key}>{b.text}</li>
            </template>
          </ul>
        </article>
      </template>
    </section>

    <footer class="footer">
      <template for:each={footerLinks} for:item="f">
        <a key={f.key} class="footer-link" href={f.href}>{f.label}</a>
      </template>
    </footer>
  </main>
</template>
